services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: taskdb
    volumes:
      # Named volume: data persists across 'docker compose down' and restarts.
      # Without this, the database is wiped every time the container is removed.
      - pgdata:/var/lib/postgresql/data
      # init.sql runs automatically on first container start (when pgdata is empty).
      # PostgreSQL looks for *.sql files in this directory and executes them in order.
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # pg_isready exits 0 when PostgreSQL is accepting connections, non-zero otherwise.
      # Docker uses this to determine if the container is 'healthy'.
      test: ["CMD-SHELL", "pg_isready -U appuser -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI application ────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend      # Dockerfile lives inside the frontend/ directory
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_ vars are compiled into the JS bundle, not read at runtime.
        # The browser calls the API at localhost:8000 — that's the host-mapped port,
        # accessible from the browser even though the frontend runs in Docker.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api   # Start after the API container (no healthcheck needed — browser calls API directly)

# Named volumes must be declared here so Docker Compose manages their lifecycle.
volumes:
  pgdata:
